<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1877D4"/>
      <stop offset="100%" stop-color="#00C8A0"/>
    </linearGradient>
    <linearGradient id="shld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9FDAFF" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- X letter (Twitter/X logo) in white -->
  <text x="4" y="22" font-family="Arial Black, sans-serif" font-weight="900" font-size="20" fill="rgba(255,255,255,0.92)" filter="url(#glow)">𝕏</text>
  <!-- Shield overlay bottom-right -->
  <path d="M22 17 L27 19 L27 23 Q27 25.5 24.5 26.5 Q22 25.5 22 23 Z" fill="url(#shld)" filter="url(#glow)"/>
  <!-- Lock body inside shield -->
  <rect x="23.2" y="22.2" width="2.6" height="2.2" rx="0.5" fill="#1877D4"/>
  <!-- Lock shackle -->
  <path d="M23.6 22.2 L23.6 21.4 Q23.6 20.4 24.5 20.4 Q25.4 20.4 25.4 21.4 L25.4 22.2" fill="none" stroke="#1877D4" stroke-width="0.9" stroke-linecap="round"/>
</svg>
